version: '3'

services:
  cliente-db:
    container_name: ms-cliente-db
    image: postgres:16
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ms_cliente
      POSTGRES_USER: ms_cliente
      POSTGRES_PASSWORD: ms_cliente
    volumes:
      - cliente_db_data:/var/lib/postgresql/data
    networks:
      - banco-network

  cuenta-db:
    container_name: ms-cuenta-db
    image: postgres:16
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ms_cuenta
      POSTGRES_USER: ms_cuenta
      POSTGRES_PASSWORD: ms_cuenta
    volumes:
      - cuenta_db_data:/var/lib/postgresql/data
    networks:
      - banco-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - banco-network

  ms-cuenta:
    build:
      context: ./ms-cuenta
    container_name: ms-cuenta
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-cuenta
      DB_PORT: 5432
      DB_NAME: cuenta_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres-cuenta:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - banco-network

  ms-cliente:
    build:
      context: ./ms-cliente
    container_name: ms-cliente
    ports:
      - "8081:8081""
    environment:
      DB_HOST: postgres-cliente
      DB_PORT: 5432
      DB_NAME: cliente_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres-cliente:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - banco-network


volumes:
  cliente_db_data:
  cuenta_db_data:

networks:
  banco-network:
    driver: bridge