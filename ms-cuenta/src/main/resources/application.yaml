server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ms-cuenta
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ms_cuenta}
    username: ${SPRING_DATASOURCE_USERNAME:ms_cuenta}
    password: ${SPRING_DATASOURCE_PASSWORD:ms_cuenta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: info

logging:
  level:
    com.banco.mscuenta: INFO
